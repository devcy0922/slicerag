services:
  slicerag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slicerag
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SLICERAG_PORT:-8095}:8095"
    environment:
      SLICERAG_STORE: ${SLICERAG_STORE:-postgres}
      SLICERAG_DATABASE_URL: ${SLICERAG_DATABASE_URL}
      SLICERAG_INTERNAL_TOKEN: ${SLICERAG_INTERNAL_TOKEN:?SLICERAG_INTERNAL_TOKEN is required}
      SLICERAG_EMBEDDING_DIMENSIONS: ${SLICERAG_EMBEDDING_DIMENSIONS:-256}
      SLICERAG_EMBEDDING_PROVIDER: ${SLICERAG_EMBEDDING_PROVIDER:-hash}
      SLICERAG_EMBEDDING_GATEWAY_URL: ${SLICERAG_EMBEDDING_GATEWAY_URL:-}
      SLICERAG_EMBEDDING_API_KEY: ${SLICERAG_EMBEDDING_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
