services:
  slicerag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slicerag
    restart: unless-stopped
    ports:
      - "${SLICERAG_PORT:-8095}:8095"
    environment:
      SLICERAG_STORE: ${SLICERAG_STORE:-postgres}
      SLICERAG_DATABASE_URL: ${SLICERAG_DATABASE_URL}
      SLICERAG_GATEWAY_URL: ${SLICERAG_GATEWAY_URL:-http://192.168.0.5:8080}
      SLICERAG_INTERNAL_TOKEN: ${SLICERAG_INTERNAL_TOKEN}
      SLICERAG_EMBEDDING_DIMENSIONS: ${SLICERAG_EMBEDDING_DIMENSIONS:-256}
    extra_hosts:
      - "host.docker.internal:host-gateway"
